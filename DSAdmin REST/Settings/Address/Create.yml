info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{protocol}}://{{hostname}}:{{setting_port}}/api/setting/address"
  body:
    type: json
    data: "{\r

      \    \"address\": {\r

      \        \"title\": \"{{$randomCompanyName}}\",\r

      \        \"address\": \"{{$randomStreetAddress}}\",\r

      \        \"address2\": \"\",\r

      \        \"city\": \"{{$randomCity}}\",\r

      \        \"state\": \"{{$randomCountryCode}}\",\r

      \        \"country\": \"{{$randomCountry}}\",\r

      \        \"zip\": \"123456\"\r

      \    }\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
