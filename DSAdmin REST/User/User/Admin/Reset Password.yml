info:
  name: Reset Password
  type: http
  seq: 4

http:
  method: POST
  url: "{{protocol}}://{{hostname}}:{{user_port}}/api/user/:id/password/reset"
  params:
    - name: id
      value: "122"
      type: path
  body:
    type: json
    data: "{\r

      \    \"new_password\": \"Password@1234\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
