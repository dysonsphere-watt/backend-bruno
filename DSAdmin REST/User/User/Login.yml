runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() == 200) {
            const data = res.getBody()
            if (data.token !== null && data.token !== undefined) {      
                bru.setGlobalEnvVar("autho", data.token);
                bru.setEnvVar("auth", data.token, {persist: true});
                bru.setVar("auth_key", data.token);
            }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
