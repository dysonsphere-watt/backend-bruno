info:
  name: Change Password
  type: http
  seq: 10

http:
  method: PUT
  url: http://{{hostname}}:{{user_port}}/api/user/password
  body:
    type: json
    data: "{\r

      \    \"current_password\": \"Benjamin1234@@\",\r

      \    \"new_password\": \"Benjamin123\"\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "if (res.getStatus() == 200) {\r

        \    const data = res.getBody()\r

        \    bru.setVar(\"auth\", data.token);\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
