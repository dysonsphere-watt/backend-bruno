info:
  name: Change PIN
  type: http
  seq: 14

http:
  method: PUT
  url: http://{{hostname}}:{{user_port}}/api/user/pin
  body:
    type: json
    data: "{\r

      \    \"current_pin\": \"\",\r

      \    \"new_pin\": \"123456\"\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
