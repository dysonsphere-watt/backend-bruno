info:
  name: Query All
  type: http
  seq: 2

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{ticketmaster_port}}/api/ticketmaster/ticket?order[ticket.updated_at]=desc"
  params:
    - name: order[ticket.updated_at]
      value: desc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
