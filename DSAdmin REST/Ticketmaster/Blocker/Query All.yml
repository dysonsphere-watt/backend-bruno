    - name: resource-id
      value: "1"
      type: path
  body:
    type: text
    data: "{\r\n    \"send_email\": true\r\n}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
