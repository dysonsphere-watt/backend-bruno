info:
  name: Query All
  type: http
  seq: 5

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{booking_port}}/api/booking?order[id]=DESC&page=1&page_size=100"
  params:
    - name: order[id]
      value: DESC
      type: query
    - name: page
      value: "1"
      type: query
    - name: page_size
      value: "100"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
