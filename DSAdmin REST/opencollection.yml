opencollection: 1.0.0

info:
  name: DSAdmin REST
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{auth}}"
  variables:
    - name: protocol
      value: http
    - name: hostname
      value: backend.watt.com.sg
    - name: setting_port
      value: "80"
    - name: user_port
      value: "80"
    - name: advertisement_port
      value: "80"
    - name: robot_port
      value: "80"
    - name: station_port
      value: "80"
    - name: log_port
      value: "80"
    - name: service_port
      value: "80"
    - name: booking_port
      value: "80"
    - name: payment_port
      value: "80"
    - name: notification_port
      value: "80"
    - name: ticketmaster_port
      value: "80"
  scripts:
    - type: after-response
      code: |-
        if (res.status === 401) {
        //   bru.runRequest("User/User/Login");
        }
bundled: false
extensions: {}
