info:
  name: Toggle Ad Screen
  type: http
  seq: 2

http:
  method: POST
  url: "{{protocol}}://{{hostname}}:{{robot_port}}/api/robot/:id/ad-screen"
  params:
    - name: id
      value: "38"
      type: path
  body:
    type: json
    data: "{\r

      \    \"ad_left\": false,\r

      \    \"ad_right\": true\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
