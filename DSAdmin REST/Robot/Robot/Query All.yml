info:
  name: Query All
  type: http
  seq: 3

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{robot_port}}/api/robot?stationless=false&filter[station_id]=7005"
  headers:
    - name: Origin
      value: http://localhost:3002
  params:
    - name: stationless
      value: "false"
      type: query
    - name: filter[station_id]
      value: "7005"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
