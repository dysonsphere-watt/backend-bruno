info:
  name: Get All Current Metrics
  type: http
  seq: 7

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{robot_port}}/api/robot/:id/metrics/current?debug=true"
  params:
    - name: debug
      value: "true"
      type: query
    - name: id
      value: "2"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
