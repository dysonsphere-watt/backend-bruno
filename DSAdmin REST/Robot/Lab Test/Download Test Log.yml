info:
  name: Download Test Log
  type: http
  seq: 4

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{robot_port}}/api/robot/:robot_id/test/:test_id/log-file"
  params:
    - name: robot_id
      value: "1"
      type: path
    - name: test_id
      value: "4"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
