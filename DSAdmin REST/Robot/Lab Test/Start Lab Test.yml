info:
  name: Start Lab Test
  type: http
  seq: 1

http:
  method: POST
  url: "{{protocol}}://{{hostname}}:{{robot_port}}/api/robot/:id/test/start"
  params:
    - name: id
      value: "5000"
      type: path
  body:
    type: json
    data: "{\r\n    \"test_id\": 0\r\n}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
