info:
  name: Get Station Details
  type: http
  seq: 11

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{advertisement_port}}/api/advertisement/station/:id?date_from=2026-01-05&date_to=2026-04-05&days[]=monday&time_ranges[]=12:00:00-15:59:59"
  params:
    - name: date_from
      value: 2026-01-05
      type: query
    - name: date_to
      value: 2026-04-05
      type: query
    - name: days[]
      value: monday
      type: query
    - name: time_ranges[]
      value: 12:00:00-15:59:59
      type: query
    - name: id
      value: "7004"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
