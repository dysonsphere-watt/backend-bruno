info:
  name: HitPay Initiate
  type: http
  seq: 1

http:
  method: POST
  url: https://api.sandbox.hit-pay.com/v1/payment-requests
  headers:
    - name: X-BUSINESS-API-KEY
      value: "{{hitpay_api_key}}"
  body:
    type: json
    data: |-
      {
        "amount": "123.00",
        "currency": "sgd",
        "payment_methods": ["paynow_online"],
        "generate_qr": false,
        "expiry_date": "2026-04-17 18:37:11"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
