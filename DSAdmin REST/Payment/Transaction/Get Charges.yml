info:
  name: Get Charges
  type: http
  seq: 1

http:
  method: GET
  url: http://{{hostname}}:{{payment_port}}/api/payment/charges?date_from=2024-06-23&date_to=2024-07-08&per_page=500
  params:
    - name: date_from
      value: 2024-06-23
      type: query
    - name: date_to
      value: 2024-07-08
      type: query
    - name: per_page
      value: "500"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
