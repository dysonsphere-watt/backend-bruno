info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{protocol}}://{{hostname}}:{{station_port}}/api/station"
  body:
    type: multipart-form
    data:
      - name: name
        type: text
        value: "{{$randomCompanyName}}"
      - name: description
        type: text
        value: "{{$randomCatchPhrase}}"
      - name: address_id
        type: text
        value: "27"
      - name: company_id
        type: text
        value: "1"
      - name: status
        type: text
        value: "1"
      - name: parking_cost
        type: text
        value: "100"
      - name: service_ids
        type: text
        value: "11"
      - name: service_ids
        type: text
        value: "12"
      - name: default_lot_search_time
        type: text
        value: "35"
      - name: tenant_company_ids
        type: text
        value: "1"
      - name: tenant_company_ids
        type: text
        value: "2"
      - name: tenant_company_ids
        type: text
        value: "3"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
