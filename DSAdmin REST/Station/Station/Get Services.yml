info:
  name: Get Services
  type: http
  seq: 9

http:
  method: GET
  url: "{{protocol}}://{{hostname}}:{{station_port}}/api/station/:station_id/services?date_from=2026-03-04&date_to=2026-04-01&days=Monday"
  params:
    - name: date_from
      value: 2026-03-04
      type: query
    - name: date_to
      value: 2026-04-01
      type: query
    - name: days
      value: Monday
      type: query
    - name: station_id
      value: "7065"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
