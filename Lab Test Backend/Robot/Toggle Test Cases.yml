info:
  name: Toggle Test Cases
  type: http
  seq: 4

http:
  method: POST
  url: "{{protocol}}://{{hostname}}:{{port}}/api/v1/robot/:vid/test-cases"
  params:
    - name: vid
      value: ds0010
      type: path
  body:
    type: json
    data: "{\r

      \    \"robot_moving\": false,\r

      \    \"robot_charging\": true,\r

      \    \"ev_charging\": true,\r

      \    \"force\": true\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
